<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 模拟植物叶子延伸效果 -->
  <!-- 这个SVG可以用PNG替代，效果更好 -->
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 叶子主体 -->
  <ellipse cx="50" cy="50" rx="40" ry="25" fill="url(#leafGrad)" transform="rotate(45 50 50)"/>
  <!-- 叶脉 -->
  <path d="M30 70 Q50 50 70 30" stroke="#1B5E20" stroke-width="2" fill="none"/>
  <path d="M35 65 Q50 50 65 35" stroke="#1B5E20" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M40 60 Q50 50 60 40" stroke="#1B5E20" stroke-width="1" fill="none" opacity="0.5"/>
</svg>